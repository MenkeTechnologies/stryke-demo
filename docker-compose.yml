services:
  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: test
    ports:
      - "3306:3306"

  postgres:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"

  kafka:
    image: bitnami/kafka:3.9
    environment:
      KAFKA_CFG_NODE_ID: "0"
      KAFKA_CFG_PROCESS_ROLES: "controller,broker"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "0@127.0.0.1:9093"
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://127.0.0.1:9092"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
    ports:
      - "9092:9092"

  localstack:
    image: localstack/localstack:latest
    environment:
      SERVICES: "s3,dynamodb,sts,sqs,lambda"
      AWS_DEFAULT_REGION: "us-east-1"
    ports:
      - "4566:4566"

  # Single-node k8s for stryke-k8s. Writes a kubeconfig to ./k3s-data/kubeconfig.yaml.
  # Use:  KUBECONFIG=$PWD/k3s-data/kubeconfig.yaml make k8s
  k3s:
    image: rancher/k3s:latest
    privileged: true
    command: server --disable=traefik --tls-san=127.0.0.1 --write-kubeconfig-mode=666
    environment:
      K3S_KUBECONFIG_OUTPUT: /output/kubeconfig.yaml
      K3S_KUBECONFIG_MODE: "666"
    volumes:
      - ./k3s-data:/output
    ports:
      - "6443:6443"
