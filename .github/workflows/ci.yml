name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  manifest:
    name: Validate stryke.toml
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Parse stryke.toml
        run: |
          python3 - <<'PY'
          import tomllib, sys
          m = tomllib.loads(open("stryke.toml").read())
          want = {"arrow","mysql","postgres","spark","aws","gcp",
                  "kafka","grpc","parquet","duckdb","redis","mongo",
                  "k8s","docker"}
          got = set(m.get("deps", {}).keys())
          missing = want - got
          extra   = got - want
          if missing or extra:
              print(f"manifest mismatch: missing={missing} extra={extra}", file=sys.stderr)
              sys.exit(1)
          for name, dep in m["deps"].items():
              if not isinstance(dep, dict) or "git" not in dep:
                  print(f"{name}: missing `git` source", file=sys.stderr); sys.exit(1)
              if not dep["git"].startswith("https://github.com/MenkeTechnologies/stryke-"):
                  print(f"{name}: bad git url {dep['git']}", file=sys.stderr); sys.exit(1)
          print(f"OK: {len(got)} git deps wired ({sorted(got)})")
          PY

  layout:
    name: Validate demo layout
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Each package has exactly one demo
        run: |
          set -euo pipefail
          expected=(01_arrow 02_mysql 03_postgres 04_spark 05_aws 06_gcp \
                    07_kafka 08_grpc 09_parquet 10_duckdb 11_redis 12_mongo \
                    13_k8s 14_docker run_all)
          fail=0
          for n in "${expected[@]}"; do
              f="demos/${n}.stk"
              if [ ! -f "$f" ]; then
                  echo "missing $f"; fail=1
              fi
          done
          # No extra .stk files in demos/.
          extra=$(comm -23 \
              <(ls demos/*.stk | xargs -n1 basename | sed 's/\.stk$//' | sort) \
              <(printf '%s\n' "${expected[@]}" | sort))
          if [ -n "$extra" ]; then
              echo "unexpected demo files: $extra"; fail=1
          fi
          exit $fail
      - name: Every demo has a shebang + use line
        run: |
          set -euo pipefail
          fail=0
          for f in demos/*.stk; do
              head -1 "$f" | grep -qE '^#!/usr/bin/env stryke' \
                  || { echo "$f: missing shebang"; fail=1; }
              # run_all imports many; the rest must `use` at least one stryke-* module.
              grep -qE '^use [A-Z][A-Za-z0-9:]+' "$f" \
                  || { echo "$f: no use line"; fail=1; }
          done
          exit $fail

  shell-targets:
    name: Validate Makefile targets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: All 14 per-package make targets present
        run: |
          set -euo pipefail
          fail=0
          for t in arrow mysql postgres spark aws gcp kafka grpc parquet duckdb redis mongo k8s docker all up down install; do
              grep -qE "^${t}:" Makefile || { echo "Makefile missing target: $t"; fail=1; }
          done
          exit $fail

  compose:
    name: Validate docker-compose.yml
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: docker compose config
        run: docker compose -f docker-compose.yml config >/dev/null
      - name: All seven service containers present
        run: |
          set -euo pipefail
          for svc in mysql postgres redis mongo kafka localstack k3s; do
              docker compose -f docker-compose.yml config --services | grep -qx "$svc" \
                  || { echo "missing service: $svc"; exit 1; }
          done

  repo-contract:
    name: Repo-contract (demos / Makefile parity)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - name: Run tests/repo-contract.sh
        # Pins every demos/*.stk file non-empty + Makefile has a
        # target for each demo (catches drift between demos/ and
        # `make all`).
        run: bash tests/repo-contract.sh

  docs-gates:
    name: Docs gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: bash tests/docs-target-blank-rel-noopener.sh
      - run: bash tests/docs-no-http-links.sh
      - run: bash tests/docs-no-inline-handlers.sh

  polish-gates:
    name: Polish gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: bash tests/man-page-no-trailing-whitespace.sh
      - run: bash tests/man-page-final-newline.sh
      - run: bash tests/man-page-synopsis-section.sh
      - run: bash tests/tests-shell-executable.sh
      - run: bash tests/tests-shell-shebang.sh
