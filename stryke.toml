[package]
name = "stryke-demo"
version = "0.1.0"
description = "Live demos of every stryke-* package: arrow, mysql, postgres, spark, aws, gcp, kafka, grpc, parquet, duckdb, redis, mongo, k8s, docker."
authors = ["MenkeTechnologies"]
license = "MIT"
repository = "https://github.com/MenkeTechnologies/stryke-demo"
edition = "2026"

# All fourteen stryke-* packages pulled from GitHub. Pinned to the main
# branch for now — flip to `tag = "vX.Y.Z"` once releases start cutting.
[deps]
stryke-arrow    = { git = "https://github.com/MenkeTechnologies/stryke-arrow",    branch = "main" }
stryke-mysql    = { git = "https://github.com/MenkeTechnologies/stryke-mysql",    branch = "main" }
stryke-postgres = { git = "https://github.com/MenkeTechnologies/stryke-postgres", branch = "main" }
stryke-spark    = { git = "https://github.com/MenkeTechnologies/stryke-spark",    branch = "main" }
stryke-aws      = { git = "https://github.com/MenkeTechnologies/stryke-aws",      branch = "main" }
stryke-gcp      = { git = "https://github.com/MenkeTechnologies/stryke-gcp",      branch = "main" }
stryke-kafka    = { git = "https://github.com/MenkeTechnologies/stryke-kafka",    branch = "main" }
stryke-grpc     = { git = "https://github.com/MenkeTechnologies/stryke-grpc",     branch = "main" }
stryke-parquet  = { git = "https://github.com/MenkeTechnologies/stryke-parquet",  branch = "main" }
stryke-duckdb   = { git = "https://github.com/MenkeTechnologies/stryke-duckdb",   branch = "main" }
stryke-redis    = { git = "https://github.com/MenkeTechnologies/stryke-redis",    branch = "main" }
stryke-mongo    = { git = "https://github.com/MenkeTechnologies/stryke-mongo",    branch = "main" }
stryke-k8s      = { git = "https://github.com/MenkeTechnologies/stryke-k8s",      branch = "main" }
stryke-docker   = { git = "https://github.com/MenkeTechnologies/stryke-docker",   branch = "main" }

[scripts]
install      = "s install"
demo-arrow   = "s demos/01_arrow.stk"
demo-mysql   = "s demos/02_mysql.stk"
demo-postgres = "s demos/03_postgres.stk"
demo-spark   = "s demos/04_spark.stk"
demo-aws     = "s demos/05_aws.stk"
demo-gcp     = "s demos/06_gcp.stk"
demo-kafka   = "s demos/07_kafka.stk"
demo-grpc    = "s demos/08_grpc.stk"
demo-parquet = "s demos/09_parquet.stk"
demo-duckdb  = "s demos/10_duckdb.stk"
demo-redis   = "s demos/11_redis.stk"
demo-mongo   = "s demos/12_mongo.stk"
demo-k8s     = "s demos/13_k8s.stk"
demo-docker  = "s demos/14_docker.stk"
all          = "s demos/run_all.stk"
